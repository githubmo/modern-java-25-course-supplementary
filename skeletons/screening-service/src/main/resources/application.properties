## ---------------------------------------------------------------------------
## Screening Service — hello-world skeleton (Day 10 starting point)
##
## Deliberately tiny: no Kafka yet. You add the incoming `applicant-registered`
## channel in the Day 10 brief. The finished config lives in apps/screening-service.
##
## NOTE: this defaults to port 8080, same as the KYC skeleton. When you run BOTH
## at once, start this one on another port:
##   ./mvnw quarkus:dev -Dquarkus.http.port=8082
## (or uncomment the line below).
## ---------------------------------------------------------------------------

quarkus.application.name=screening-service
quarkus.http.port=8080
# quarkus.http.port=8082
